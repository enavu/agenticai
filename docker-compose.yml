services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - PORT=8080
      - TZ=America/Denver
      - DATABASE_URL=postgres://enavu:enavu@postgres:5432/enavu_hub?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - HA_URL=${HA_URL:-https://hotel89408.com}
      - HA_TOKEN=${HA_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_USER_ID=${INSTAGRAM_USER_ID}
      - SCRAPER_URL=http://scraper:8001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=${PLAID_ENV:-sandbox}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scraper:
        condition: service_started
    restart: unless-stopped
    networks:
      - enavu-net

  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - CYCLEBAR_USERNAME=${CYCLEBAR_USERNAME}
      - CYCLEBAR_PASSWORD=${CYCLEBAR_PASSWORD}
    restart: unless-stopped
    networks:
      - enavu-net

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
      - NEXT_PUBLIC_API_URL=https://enavu.io
      - NEXT_PUBLIC_WS_URL=wss://enavu.io
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - enavu-net

  tfc:
    build:
      context: ./services/tfc
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://enavu:enavu@postgres:5432/enavu_hub?sslmode=disable
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=${PLAID_ENV:-sandbox}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - enavu-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: enavu_hub
      POSTGRES_USER: enavu
      POSTGRES_PASSWORD: enavu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enavu -d enavu_hub"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enavu-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - enavu-net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  enavu-net:
    driver: bridge
