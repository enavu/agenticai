services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - enavu-net

  frontend:
    build:
      args:
        - NEXT_PUBLIC_API_URL=https://enavu.io
        - NEXT_PUBLIC_WS_URL=wss://enavu.io
    ports: []  # Caddy handles external traffic, no direct port exposure
    environment:
      - API_URL=http://api:8080
      - NEXT_PUBLIC_API_URL=https://enavu.io
      - NEXT_PUBLIC_WS_URL=wss://enavu.io

  api:
    ports: []  # Not exposed directly in prod
    environment:
      - ENV=production
      - SITE_URL=https://enavu.io
    volumes:
      - uploads_data:/data/uploads

volumes:
  caddy_data:
  caddy_config:
  uploads_data:
